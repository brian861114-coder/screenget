<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <title>ScreenGet</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      width: 300px;
      min-height: 200px;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      color: #e0e0e0;
      font-family: 'Microsoft JhengHei UI', 'Segoe UI', sans-serif;
      padding: 16px;
    }
    .header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
    }
    .header h1 {
      font-size: 16px;
      color: #00d2ff;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 8px 12px;
      background: rgba(0, 210, 255, 0.1);
      border-radius: 8px;
      margin-bottom: 12px;
      font-size: 13px;
    }
    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #6bcb77;
    }
    .status-dot.disconnected {
      background: #ff6b6b;
    }
    .current-page {
      padding: 12px;
      background: rgba(255, 255, 255, 0.05);
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .current-page .label {
      font-size: 11px;
      color: #8899aa;
      margin-bottom: 4px;
    }
    .current-page .url {
      font-size: 12px;
      color: #00d2ff;
      word-break: break-all;
    }
    .info {
      font-size: 11px;
      color: #8899aa;
      text-align: center;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="header">
    <span>🖥️</span>
    <h1>ScreenGet</h1>
  </div>
  
  <div class="status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">連線中...</span>
  </div>
  
  <div class="current-page">
    <div class="label">目前追蹤頁面</div>
    <div class="url" id="currentUrl">無</div>
  </div>
  
  <div class="info">
    資料將自動同步到 ScreenGet 桌面應用
  </div>

  <script src="popup.js"></script>
</body>
</html>
